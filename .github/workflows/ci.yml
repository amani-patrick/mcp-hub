name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build artifacts
        run: npm run verify:build

      - name: Build all workspaces
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Lint web hub
        run: npm run lint -w @amani-patrick/mcp-hub

      - name: Verify MCP servers
        run: npm run verify

  hub:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build -w @amani-patrick/mcp-hub

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-hub-dist
          path: mcp-hub/dist
