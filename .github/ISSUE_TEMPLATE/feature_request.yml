name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New MCP tool
        - Existing MCP tool
        - Web documentation hub
        - Developer experience / CI
        - Documentation
        - Other
    validations:
      required: true
